name: Test Project
on: push
jobs: 
  test-job:
    runs-on: windows-latest
    steps:
        - name: Download the code
          uses: actions/checkout@v3

        - name: install dependencies
          uses: actions/setup-node@v3
          with:
            node-version: '18'

        - name: Install NPM packages
          run: npm ci

        - name: Run tests
          run: 'npx playwright test --grep "Test Case 1: Register User" --headed'
        

         